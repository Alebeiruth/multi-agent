[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes (imports não usados, variáveis indefinidas)
    "I",   # isort (ordenação de imports)
    "B",   # flake8-bugbear (bugs comuns e más práticas)
    "UP",  # pyupgrade (sintaxe moderna do Python)
    "N",   # pep8-naming (convenções de nomes)
]
ignore = [
    "E501",  # linha longa — controlado por line-length
    "B008",  # não chamar funções em defaults de argumentos (LangChain usa isso)
    "N999",  # nome de módulo inválido — arquivos com underscores são ok
    "W293",  # espaço em linha vazia — ocorre em f-strings de system prompts
    "W291",  # trailing whitespace — ocorre em f-strings de system prompts
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = [
    "F401",  # imports não usados em testes (fixtures importadas indiretamente)
    "S101",  # uso de assert em testes é esperado
]
"*/__init__.py" = [
    "F401",  # __init__.py são arquivos de re-export — F401 não se aplica
]

[tool.ruff.lint.isort]
known-first-party = ["tools", "agents"]
force-sort-within-sections = true

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short --no-header -q"